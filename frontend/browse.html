<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="darkreader-lock">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light only">
  <meta name="description" content="Browse all found items on campus to see if your lost belonging has been secured.">
  <meta property="og:title" content="Browse Found Items — CampusFoundIt">
  <title>Browse Found Items — CampusFoundIt</title>
  <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body style="background-color: #FFFFFF !important; color: #1C1C1C !important;">
  <!-- Navigation -->
  <nav class="nav">
    <div class="container nav-container">
      <a href="index.html" class="nav-brand">
        CampusFoundIt
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="report-lost.html" class="nav-link">Report Lost Item</a>
        <a href="report-found.html" class="nav-link">Report Found Item</a>
        <a href="browse.html" class="nav-link active">Browse Items</a>
        <a href="admin.html" class="nav-link text-muted">Admin</a>
      </div>
    </div>
  </nav>

  <!-- Page Header -->
  <header class="section bg-subtle" style="padding-bottom: var(--space-20);">
    <div class="container relative" style="z-index: 20;">
      <h1 class="hero-title">Found Items Directory</h1>
      <p class="hero-subtitle">Search and filter through all items that have been turned in by the campus community.</p>
    </div>
    
    <!-- Diagonal SVG Divider -->
    <div class="diagonal-divider">
      <svg data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
        <path d="M1200 120L0 16.48 0 0 1200 0 1200 120z" class="shape-fill"></path>
      </svg>
    </div>
  </header>

  <main class="section" style="padding-top: var(--space-8);">
    <div class="container">

      <!-- Filter Bar -->
      <div class="card mb-8">
        <div class="form-row" style="align-items: flex-end;">
          <div class="form-group" style="flex: 2; margin-bottom: 0;">
            <label for="searchInput" class="form-label">Search Keyword</label>
            <input type="text" id="searchInput" class="form-input" placeholder="Search item, color, or brand...">
          </div>
          <div class="form-group" style="margin-bottom: 0;">
            <label for="filterCategory" class="form-label">Category</label>
            <select id="filterCategory" class="form-select">
              <option value="all">All Categories</option>
              <option value="ID Card">ID Card</option>
              <option value="Laptop">Laptop</option>
              <option value="Wallet">Wallet</option>
              <option value="Phone">Phone</option>
              <option value="Keys">Keys</option>
              <option value="Umbrella">Umbrella</option>
              <option value="Earphones">Earphones</option>
              <option value="Bag">Bag</option>
              <option value="Water Bottle">Water Bottle</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom: 0;">
            <label for="filterLocation" class="form-label">Location Found</label>
            <select id="filterLocation" class="form-select">
              <option value="all">All Locations</option>
              <option value="Library">Library</option>
              <option value="Canteen">Canteen</option>
              <option value="Classroom">Classroom</option>
              <option value="Lecture Hall">Lecture Hall</option>
              <option value="Washroom">Washroom</option>
              <option value="Parking">Parking</option>
              <option value="Corridor">Corridor</option>
              <option value="Gym">Gym</option>
              <option value="Auditorium">Auditorium</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom: 0;">
            <label for="filterStatus" class="form-label">Status</label>
            <select id="filterStatus" class="form-select">
              <option value="all">All Statuses</option>
              <option value="unclaimed">Unclaimed</option>
              <option value="matched">Matched</option>
              <option value="returned">Returned</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Items Grid / Loaders -->
      <div id="foundItemsContainer" class="grid-auto">
        <!-- Skeleton Skeletons shown on initial load -->
        <div class="item-card skeleton">
          <div style="height:200px; width:100%;"></div>
          <div class="item-card-content">
            <div class="skeleton-title mb-2"></div>
            <div class="skeleton-text"></div>
            <div class="skeleton-text short"></div>
          </div>
        </div>
        <div class="item-card skeleton">
          <div style="height:200px; width:100%;"></div>
          <div class="item-card-content">
            <div class="skeleton-title mb-2"></div>
            <div class="skeleton-text"></div>
            <div class="skeleton-text short"></div>
          </div>
        </div>
        <div class="item-card skeleton">
          <div style="height:200px; width:100%;"></div>
          <div class="item-card-content">
            <div class="skeleton-title mb-2"></div>
            <div class="skeleton-text"></div>
            <div class="skeleton-text short"></div>
          </div>
        </div>
      </div>

      <!-- Empty State -->
      <div id="emptyStateContainer" style="display: none; padding: var(--space-16) 0; text-align: center;">
        <h3 class="text-muted mb-2">No items found</h3>
        <p class="text-muted mb-4">Try adjusting your filters or search keywords.</p>
        <button class="btn btn-outline" onclick="resetFilters()">Clear Filters</button>
      </div>

    </div>
  </main>

  <footer class="footer">
    <div class="container flex-justify-between">
      <p><strong>CampusFoundIt</strong> &copy; 2026</p>
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
  <script src="js/browse.js"></script>
</body>
</html>
